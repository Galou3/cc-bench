name: hard
description: >
  Harder Python tasks with HELD-OUT tests (never shown to the agent), so the
  pass rate sits below the 100% ceiling and a real config effect can show up.
tasks:
  - id: merge_intervals
    template_dir: tasks/merge_intervals/workspace
    reference_dir: tasks/merge_intervals/reference
    hidden_tests_dir: tasks/merge_intervals/hidden
    verify_cmd: ["python", "-m", "pytest", "-q", "test_hidden_merge_intervals.py"]
    timeout_s: 300
    tags: [hard]
    prompt: |
      Implement a function `merge_intervals` in a module named `intervals.py`:
      
          def merge_intervals(intervals: list[list[int]]) -> list[list[int]]:
      
      Given a list of integer intervals (each a `[start, end]` pair with `start <= end`),
      merge all overlapping AND merely touching intervals, and return the result as a new
      list sorted by start value (ascending; ties broken by end ascending).
      
      Definitions and rules:
      - Two intervals OVERLAP if they share any point. They merely TOUCH if the end of one
        equals the start of the next, e.g. `[1, 2]` and `[2, 3]`. BOTH cases must be merged:
        `merge_intervals([[1, 2], [2, 3]]) == [[1, 3]]`. Merging is transitive, so a chain
        of touching intervals collapses into one: `[[1,2],[2,3],[3,4]] -> [[1,4]]`.
      - A merged interval spans from the minimum start to the maximum end of the intervals
        that were merged together.
      - Fully NESTED intervals collapse into the enclosing one:
        `merge_intervals([[1, 10], [2, 3]]) == [[1, 10]]`.
      - Input may be UNSORTED; you must not assume any ordering. The OUTPUT must always be
        sorted by start (then by end).
      - DUPLICATE intervals merge into a single interval:
        `merge_intervals([[1, 4], [1, 4], [1, 4]]) == [[1, 4]]`.
      - EMPTY input returns `[]`. A single interval returns a list containing that interval.
      - Disjoint intervals that neither overlap nor touch stay separate, e.g.
        `[[1, 2], [4, 5]]` stays `[[1, 2], [4, 5]]`.
      - Negative and zero values are valid. Zero-width intervals like `[1, 1]` are valid and
        follow the same rules: `[[1, 1], [1, 3]] -> [[1, 3]]`.
      - Do NOT mutate the caller's input list or its inner lists; return freshly built lists.
      
      Use only the Python standard library. The implementation must be deterministic.
  - id: roman
    template_dir: tasks/roman/workspace
    reference_dir: tasks/roman/reference
    hidden_tests_dir: tasks/roman/hidden
    verify_cmd: ["python", "-m", "pytest", "-q", "test_hidden_roman.py"]
    timeout_s: 300
    tags: [hard]
    prompt: |
      Implement a Roman numeral converter in a module named `roman.py` exposing two functions.
      
      ## `int_to_roman(n: int) -> str`
      Convert an integer to its Roman numeral string using standard SUBTRACTIVE notation.
      
      - Valid input range is 1..3999 inclusive.
      - Use the subtractive forms: 4 -> "IV", 9 -> "IX", 40 -> "XL", 90 -> "XC", 400 -> "CD", 900 -> "CM" (never "IIII", "VIIII", "XXXX", "LXXXX", "CCCC", "DCCCC").
      - Symbols are uppercase: I=1, V=5, X=10, L=50, C=100, D=500, M=1000.
      - Examples: 1 -> "I", 3 -> "III", 58 -> "LVIII", 1994 -> "MCMXCIV", 3888 -> "MMMDCCCLXXXVIII", 3999 -> "MMMCMXCIX".
      - For an out-of-range integer (n < 1 or n > 3999) raise `ValueError`.
      
      ## `roman_to_int(s: str) -> int`
      Parse a VALID Roman numeral string and return its integer value. The function must be STRICT: it accepts only the unique canonical (well-formed, subtractive) representation of a number in 1..3999, and raises `ValueError` for anything else.
      
      It MUST raise `ValueError` for, among others:
      - the empty string `""`;
      - strings containing any character not in {I, V, X, L, C, D, M}, e.g. "ABC";
      - lowercase input, e.g. "iv", "mcmxciv";
      - non-canonical additive forms such as "IIII" (canonical is "IV") or repeated five-symbols like "VV";
      - invalid subtractive pairs such as "IC", "IL", "XM", "VX";
      - values that would exceed the range, e.g. "MMMM" (4000);
      - any other string whose value, when converted back with `int_to_roman`, does not reproduce the original string exactly.
      
      For a canonical numeral it returns the correct integer, e.g. "IV" -> 4, "IX" -> 9, "XL" -> 40, "XC" -> 90, "CD" -> 400, "CM" -> 900, "MCMXCIV" -> 1994.
      
      A correct pair of functions round-trips for every n in 1..3999: `roman_to_int(int_to_roman(n)) == n`.
      
      Constraints: pure Python standard library only; deterministic. A robust strict-validation strategy is to convert the parsed value back with `int_to_roman` and require it to equal the input string exactly.
  - id: lru_cache
    template_dir: tasks/lru_cache/workspace
    reference_dir: tasks/lru_cache/reference
    hidden_tests_dir: tasks/lru_cache/hidden
    verify_cmd: ["python", "-m", "pytest", "-q", "test_hidden_lru_cache.py"]
    timeout_s: 300
    tags: [hard]
    prompt: |
      Implement a Least-Recently-Used (LRU) cache as a class named `LRUCache` in a module `lru.py`, using only the Python standard library. Behaviour must be deterministic.
      
      API:
      
      class LRUCache:
          def __init__(self, capacity: int) -> None: ...
          def get(self, key) -> "value or -1": ...
          def put(self, key, value) -> None: ...
      
      Semantics:
      
      - `__init__(self, capacity)`: `capacity` is the maximum number of entries the cache holds. If `capacity` is less than 1, raise `ValueError`. You may assume `capacity` is otherwise a valid positive integer; you do not need to support `capacity == 0` (it must raise).
      
      - `get(self, key)`: return the value stored for `key`, or `-1` if `key` is not present. A successful `get` (key present) counts as a USE: it refreshes the key's recency, making it the most-recently-used entry. A `get` that misses (returns -1) does not change anything.
      
      - `put(self, key, value)`: insert or update `key` with `value`. A `put` always counts as a USE: after `put`, `key` is the most-recently-used entry.
        - If `key` is NOT already present and the cache is already at capacity, evict the single least-recently-used entry BEFORE/while inserting so the size never exceeds `capacity`.
        - If `key` IS already present, update its value AND refresh its recency (it becomes most-recently-used). Updating an existing key never triggers an eviction (the size does not grow).
      
      Recency model (most important detail): every successful `get` and every `put` (whether insert or update) moves the touched key to the "most recently used" position. The entry evicted on overflow is always the one that has gone the longest without being touched by a successful `get` or a `put`.
      
      Edge cases your implementation must handle:
      - `get` on an absent key returns `-1` and does not affect recency or contents.
      - A successful `get` refreshes recency, so a later overflow does not evict the just-read key.
      - Updating an existing key via `put` refreshes its recency (and stores the new value), so a later overflow does not evict it.
      - `capacity == 1`: putting a second distinct key evicts the first; updating the same key keeps it.
      - `capacity < 1` raises `ValueError`.
      
      Keys and values may be any hashable/any object respectively.
  - id: json_path
    template_dir: tasks/json_path/workspace
    reference_dir: tasks/json_path/reference
    hidden_tests_dir: tasks/json_path/hidden
    verify_cmd: ["python", "-m", "pytest", "-q", "test_hidden_json_path.py"]
    timeout_s: 300
    tags: [hard]
    prompt: |
      Implement `get_path(data, path, default=None)` in a module named `jsonpath.py`.
      
      PURPOSE
      Navigate an arbitrary structure of nested dicts and lists using a single string `path`,
      and return the value found there. If the path cannot be fully resolved, return `default`.
      
      PATH SYNTAX
      - A path is a sequence of steps separated by `.`.
      - Each step is a dict key optionally followed by one or more list-index brackets.
        Examples: "a", "a.b.c", "items[2].name", "a.b[0].c", "a[0][1]".
      - `key` (alphabetic/identifier-ish text before any `[`) selects a value in a dict by that key.
      - `[n]` selects an element of a list by integer index `n` (the brackets contain a
        base-10 integer, which may be negative). Multiple brackets chain on the result of the
        previous selection (e.g. "grid[1][2]").
      - A bare key path like "a" works and returns `data["a"]`.
      - "a[0]" first selects key "a", then indexes element 0 of the list stored there.
      
      RESOLUTION RULES
      Walk the steps left to right against the current value (starting at `data`):
      - Applying a key requires the current value to be a dict that contains that key; otherwise
        return `default`.
      - Applying an index `[n]` requires the current value to be a list and `n` to be within
        range (standard Python indexing, so negatives count from the end); otherwise return
        `default`.
      
      Return `default` (and stop) the first time ANY step fails for any of these reasons:
      - missing dict key,
      - list index out of range,
      - type mismatch — indexing a non-list (e.g. `[0]` applied to a dict or scalar) or keying
        a non-dict (e.g. `.name` applied to a list or scalar).
      
      IMPORTANT DETAILS
      - Indexing a dict with `[n]` is ALWAYS a type mismatch and yields `default`, even if the
        dict happens to contain an integer key `n` (do not fall back to `dict[n]`).
      - Keying a list with `.name` is ALWAYS a type mismatch and yields `default` (do not raise).
      - The function must never raise on a non-resolvable path; it returns `default` instead.
      - Falsy values that genuinely exist at the path (0, False, None, "") must be returned
        as-is and must NOT be replaced by `default`.
      
      Standard library only; deterministic. Keep it focused.
